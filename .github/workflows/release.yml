name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 注入版本号并打包
        run: |
          bash scripts/package.sh "${GITHUB_REF_NAME}"

      - name: 读取版本号
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "archive=output/v${VERSION}/weblogviewer.tar.gz" >> $GITHUB_OUTPUT

      - name: 创建 Release 附件
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.version.outputs.archive }}
          fail_on_unmatched_files: true
          make_latest: true
          generate_release_notes: true
