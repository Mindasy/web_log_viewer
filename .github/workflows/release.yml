name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 全量验证（含重型解析 + 服务器冒烟）
        run: |
          bash test/validate.sh --force

  build-and-deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 注入版本号并打包
        run: |
          bash scripts/package.sh "${GITHUB_REF_NAME}"

      - name: 读取版本号
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "archive=output/v${VERSION}/weblogviewer.tar.gz" >> $GITHUB_OUTPUT
          echo "pages_dir=output/v${VERSION}/pages" >> $GITHUB_OUTPUT

      - name: 解压到 Pages 目录
        run: |
          mkdir -p "${{ steps.version.outputs.pages_dir }}"
          tar -xzf "${{ steps.version.outputs.archive }}" \
            -C "${{ steps.version.outputs.pages_dir }}"

      - name: 创建 Release 附件
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.version.outputs.archive }}
          fail_on_unmatched_files: true
          make_latest: true
          generate_release_notes: true

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传 Pages 工件
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.version.outputs.pages_dir }}

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
