name: PR 验证

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 运行全量验证（含重型 250w 行解析测试）
        run: |
          bash test/validate.sh --fast --force
