**描述问题**
清晰简洁地说明你所遇到的问题。

**复现步骤**
1. 打开文件或测试样本
2. 点击「...」
3. 观察现象

**预期行为**
你认为应该发生什么？

**截图**
如果方便，附上截图有助于定位。

**日志信息**
- 日志格式：Log4j / Log4j2 / Bracket / JSON / Syslog / 其它
- 日志行数：约 xxx 行
- 是否可提供脱敏样本：是 / 否

**运行环境**
- 浏览器：Chrome / Firefox / Edge / Safari  版本
- 操作系统：Windows / macOS / Linux

**补充说明**
其他有帮助的信息。
